<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Medano Admin | Login</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel">
        <div class="auth-brand">
          <img src="./assets/logo-medano.svg" alt="" />
          <div>
            <span>Medano</span>
            <strong>Admin</strong>
          </div>
        </div>
        <div>
          <p class="eyebrow">Acceso privado</p>
          <h1>Ingresar al panel</h1>
          <p class="muted">Acceso a catalogo y pedidos con autenticacion por cookie segura.</p>
        </div>

        <form class="auth-form" id="loginForm">
          <label>
            Clave
            <input type="password" id="passwordInput" name="password" autocomplete="current-password" placeholder="Clave segura" required />
          </label>
          <button class="primary-button" type="submit" id="loginButton">Entrar</button>
          <p class="auth-status" id="loginStatus" aria-live="polite"></p>
        </form>

        <a class="secondary-button auth-back" href="/">Volver al sitio</a>
      </section>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
